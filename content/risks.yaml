- id: risk-occult-inflation
  label: "Occult Inflation"
  statement: "Occult knowledge or practice leads to an inflated sense of specialness, power, or access to hidden truth."
  causedBy: ["gnostic_impulse", "special_knowledge_acquisition"]
  correctives: ["corrective-madhyamaka", "corrective-jung-shadow", "corrective-humility", "corrective-social-praxis"]

- id: risk-dry-deconstruction
  label: "Dry Deconstruction"
  statement: "Analysis and deconstruction become an end in themselves, leading to intellectual aridity without transformation."
  causedBy: ["excessive_analysis", "fear_of_practice"]
  correctives: ["corrective-burbea-soulmaking", "corrective-rasa", "corrective-devotion", "corrective-body-practice"]

- id: risk-spiritual-bypass
  label: "Spiritual Bypass"
  statement: "Spiritual concepts or practices are used to avoid psychological wounds, social responsibility, or concrete life tasks."
  causedBy: ["avoidance_of_pain", "spiritual_identity"]
  correctives: ["corrective-marx", "corrective-somatics", "corrective-trauma-work", "corrective-concrete-repair"]

- id: risk-system-possession
  label: "System Possession"
  statement: "A metaphysical or philosophical system becomes a totalizing lens that resists questioning and distorts experience."
  causedBy: ["intellectual_map_addiction", "certainty_seeking"]
  correctives: ["corrective-krishnamurti", "corrective-nagarjuna", "corrective-wittgenstein", "corrective-fruit-test"]

- id: risk-channeling-dependency
  label: "Channeling Dependency"
  statement: "External guidance (entities, spirits, intuitions) replaces personal discernment and decision-making."
  causedBy: ["fear_of_agency", "external_authority_seeking"]
  correctives: ["corrective-nyaya-pramana", "corrective-jung-projection", "corrective-decision-journal"]

- id: risk-energy-chasing
  label: "Energy Chasing"
  statement: "Subtle energy practices become a pursuit of special sensations rather than grounded transformation."
  causedBy: ["sensation_seeking", "body_dissociation"]
  correctives: ["corrective-ethics", "corrective-grounding", "corrective-madhyamaka"]

- id: risk-nihilism
  label: "Nihilism"
  statement: "Emptiness or deconstruction leads to meaninglessness, passivity, or moral nihilism."
  causedBy: ["misapplied_emptiness", "deconstruction_without_reconstruction"]
  correctives: ["corrective-burbea-soulmaking", "corrective-social-praxis", "corrective-ethics"]

- id: risk-intellectual-map-addiction
  label: "Intellectual Map Addiction"
  statement: "Reading, studying, and map-collecting substitutes for actual practice and embodied transformation."
  causedBy: ["fear_of_practice", "desire_for_certainty"]
  correctives: ["corrective-nanananda-protocol", "corrective-body-grounding", "corrective-social-praxis", "corrective-source-fasting"]

- id: risk-cosmic-specialness
  label: "Cosmic Specialness"
  statement: "Believing one has unique cosmic knowledge, mission, or status based on visionary or channeled material."
  causedBy: ["gnostic_impulse", "visionary_experience_without_grounding"]
  correctives: ["corrective-humility", "corrective-fruit-test", "corrective-social-praxis", "corrective-madhyamaka"]

- id: risk-category-error
  label: "Category Error"
  statement: "Mistaking conceptual parallels for historical influence, or one domain's conclusions for another domain's proof."
  causedBy: ["lack_of_historical_distinction", "domain_collapse"]
  correctives: ["corrective-epistemic-tiering", "corrective-historical-distinction", "corrective-madhyamaka"]

- id: risk-attention-collapse
  label: "Attention Collapse"
  statement: "Practice or nonordinary exploration leads to fragmented attention, drowsiness, or inability to maintain focus."
  causedBy: ["overextension", "lack_of_grounding", "poor_timing"]
  correctives: ["corrective-body-anchor", "corrective-shorter-session", "corrective-contact-feeling-sign"]

- id: risk-state-chasing
  label: "State Chasing"
  statement: "Pursuit of interesting nonordinary states replaces grounded practice and ordinary-life integration."
  causedBy: ["novelty_seeking", "dissatisfaction_with_ordinary"]
  correctives: ["corrective-body-grounding", "corrective-ordinary-life-practice", "corrective-social-praxis"]
