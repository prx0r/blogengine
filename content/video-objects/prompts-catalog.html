<!DOCTYPE html>
<html><head>
<title>Ochema — Prompt Catalog</title>
<style>
body{font-family:system-ui,sans-serif;background:#0d0d0d;color:#ddd;padding:20px;max-width:1400px;margin:auto}
h1{color:#d4a574;font-size:28px}
h2{color:#d4a574;margin-top:40px;border-bottom:1px solid #333;padding-bottom:8px}
h3{color:#e8c39e;margin:20px 0 5px;font-size:16px}
.cat-nav{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0}
.cat-nav a{background:#1a1a1a;color:#d4a574;padding:6px 14px;border-radius:4px;text-decoration:none;font-size:13px;border:1px solid #333}
.cat-nav a:hover{background:#2a2a2a;border-color:#d4a574}
.clip{background:#1a1a1a;border-radius:6px;padding:14px 18px;margin:10px 0;border-left:3px solid #d4a574}
.clip-id{color:#d4a574;font-weight:bold;font-size:14px;display:inline-block;width:80px}
.clip-title{color:#fff;font-size:14px}
.clip-prompt{color:#aaa;font-size:13px;line-height:1.6;margin:8px 0 4px}
.clip-meta{color:#666;font-size:12px;display:flex;gap:20px}
.clip-tags{color:#888;font-size:11px;margin-top:4px}
.copy-btn{background:transparent;border:1px solid #555;color:#aaa;padding:2px 10px;border-radius:3px;cursor:pointer;font-size:11px;float:right}
.copy-btn:hover{background:#d4a574;color:#000;border-color:#d4a574}
.search-box{width:100%;padding:12px 16px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#fff;font-size:15px;margin:20px 0}
.search-box:focus{outline:none;border-color:#d4a574}
.stats{color:#666;font-size:13px;margin-top:30px;text-align:center}
</style></head><body>
<h1>📽 Ochema — 184 Prompt Catalog</h1>
<p style="color:#888">Style prefix: <code style="background:#1a1a1a;padding:2px 6px;border-radius:3px">Stop-motion animation, clay-textured, handcrafted aesthetic, warm parchment tones...</code></p>

<input class="search-box" id="search" placeholder="Search prompts by keyword..." oninput="filter()">

<div class="cat-nav" id="nav"></div>
<div id="clips"></div>
<div class="stats" id="stats"></div>

<script>
// Load the JSON catalog
fetch('/root/projects/blog/content/video-objects/prompts-catalog.json')
  .then(r => r.json())
  .then(data => {
    window.catalog = data;
    render(data);
  });

function render(data) {
  const nav = document.getElementById('nav');
  const clipsDiv = document.getElementById('clips');
  const stats = document.getElementById('stats');
  
  nav.innerHTML = data.categories.map(c => 
    `<a href="#${c.name.replace(/\s+/g,'_')}">${c.name} (${c.count})</a>`
  ).join('');
  
  clipsDiv.innerHTML = data.categories.map(cat => {
    let html = `<h2 id="${cat.name.replace(/\s+/g,'_')}">${cat.name} (${cat.count} clips)</h2>`;
    cat.clips.forEach(c => {
      const style = data.meta.style_prefix;
      const prompt = style + ', ' + c.prompt.replace(/\s+/g,' ') + ', silence, no audio, complete quiet';
      const duration = c.duration_sec || 15;
      const tags = c.tags ? c.tags.join(', ') : '';
      html += `
        <div class="clip">
          <button class="copy-btn" onclick="copyPrompt(this,'${c.id}')">Copy</button>
          <span class="clip-id">${c.id}</span>
          <span class="clip-title">${c.title || ''}</span>
          <div class="clip-prompt">${c.prompt || ''}</div>
          <div class="clip-meta">
            <span>⏱ ${duration}s</span>
            ${tags ? `<span>🏷 ${tags}</span>` : ''}
          </div>
        </div>`;
    });
    return html;
  }).join('');
  
  stats.textContent = `${data.meta.total_clips} total clips • ${data.categories.length} categories`;
  window.copyData = {};
  data.categories.forEach(cat => cat.clips.forEach(c => {
    window.copyData[c.id] = data.meta.style_prefix + ', ' + c.prompt.replace(/\s+/g,' ') + ', silence, no audio, complete quiet' + '\n\nNegative: ' + data.meta.negative_prompt;
  }));
}

function copyPrompt(btn, id) {
  const text = window.copyData[id] || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.clip').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
</script>
</body></html>
