  grounds: ["Emptiness as creative freedom"]
  enables: ["Soulmaking practice", "Imaginal-emergent practice"]
  correctives: ["Dry deconstruction", "Occult inflation"]
  bestUsedFor: "Emptiness-imagination integration, soulmaking, poetic practice."
