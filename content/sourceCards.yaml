- id: source-iamblichus-mysteries
  title: "On the Mysteries"
  author: "Iamblichus"
  tradition: "Neoplatonism / Theurgy"
  phase: [12, 13]
  sourceType: "primary_text"
  epistemicTier: "serious_interpretive"
  coreContribution: "Defends theurgy as a genuine mode of participation in the divine, against purely philosophical approaches."
  breaks: ["Ritual is inferior to philosophy"]
  grounds: ["Ritual as genuine participation"]
  enables: ["Ritual re-rendering", "Theurgic practice framework"]
