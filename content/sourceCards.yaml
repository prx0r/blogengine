- id: source-nagarjuna-mulamadhyamaka
  title: "Mūlamadhyamakakārikā"
  author: "Nāgārjuna"
  tradition: "Madhyamaka / Mahāyāna Buddhism"
  phase: [7]
  sourceType: "primary_text"
  epistemicTier: "serious_interpretive"
  coreContribution: "Foundational text of the Madhyamaka school. Uses reductio arguments to show all phenomena empty of inherent existence."
  breaks: ["Things have fixed essence"]
  grounds: ["Emptiness as dependent arising"]
  enables: ["Anti-reification practice", "Four-corner negation"]
  correctives: ["Metaphysical system possession", "Occult inflation"]
  bestUsedFor: "Emptiness analysis, anti-reification, deconstruction of fixed views."
  caution: "Can be weaponized for nihilism if not balanced by compassion and conventional truth."

- id: source-campbell-mbt
  title: The Masks of God / The Hero with a Thousand Faces
  author: "Joseph Campbell"
  tradition: "Comparative Mythology / Perennial Philosophy"
  phase: [14, 16]
  sourceType: "book"
  epistemicTier: "speculative"
  coreContribution: "Argues that world mythologies share deep structural patterns and that myth serves functions of metaphysical, cosmological, sociological, and pedagogical explanation."
  breaks: ["Myth is false"]
  grounds: ["Myth as meaningful structure"]
  enables: ["Comparative mythological analysis", "Archetypal engagement"]
  risks: ["Perennialist flattening", "Universalist overreach"]
  correctives: ["Historical distinction", "Cultural specificity", "Fruit test"]
  bestUsedFor: "Comparative mythology, archetypal patterns, narrative metaphysics."
  caution: "Campbell's perennialist framework can flatten cultural specificity and historical distinction."

- id: source-hoffman-interface
  title: "The Case Against Reality"
  author: "Donald Hoffman"
  tradition: "Cognitive Science / Evolutionary Psychology"
  phase: [2, 14]
  sourceType: "book"
  epistemicTier: "speculative"
  coreContribution: "Argues that evolution shapes perception to hide reality, not reveal it. Perception is an interface, not a window."
  breaks: ["Perception reveals reality as it is"]
  grounds: ["Interface theory of perception"]
  enables: ["Nonordinary rendering exploration", "Phenomenological investigation"]
  risks: ["Interface theory as literal metaphysics", "Anti-realism"]
  correctives: ["Epistemic tiering", "Phenomenological grounding", "Fruit test"]
  bestUsedFor: "Interface theory, perception, nonordinary states as alternative renderings."
  caution: "Hoffman's conscious agent model is speculative, not established science."

- id: source-burbea-soulmaking
