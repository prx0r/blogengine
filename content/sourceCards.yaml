  breaks: ["Imagination is fantasy"]
  grounds: ["Imagination as perception", "Intermediate realm"]
  enables: ["Active imagination", "Symbolic engagement", "Guidance figures"]
  risks: ["Imaginal inflation", "Psychotic confusion"]
  correctives: ["Historical distinction", "Fruit test", "Body grounding"]
