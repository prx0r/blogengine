- id: source-plotinus-enneads
  title: "Enneads"
  author: "Plotinus"
  tradition: "Neoplatonism"
  phase: [2, 7]
  sourceType: "primary_text"
  epistemicTier: "serious_interpretive"
  coreContribution: "Foundational text of Neoplatonic philosophy: the One, Intellect, Soul, emanation, and return."
  breaks: ["Matter is dead and fundamental"]
  grounds: ["Hierarchical reality", "Participatory metaphysics"]
  enables: ["Contemplative ascent", "Theurgic philosophy"]
  risks: ["Metaphysical system possession", "Hierarchy inflation"]
  correctives: ["Madhyamaka", "Historical distinction"]
  bestUsedFor: "Emanation metaphysics, contemplative philosophy, Western esoteric lineage."
