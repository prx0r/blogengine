- id: corrective-madhyamaka
  label: "Madhyamaka / Anti-Reification"
  statement: "Use Madhyamaka dialectics to deconstruct fixed views without falling into nihilism."
  practice: "Apply four-corner negation to any reified concept."

- id: corrective-jung-shadow
  label: "Jung Shadow Work"
  statement: "Integrate rejected and unconscious aspects of self through active imagination and dream work."
  practice: "Active imagination with shadow figures. Journal without censorship."

- id: corrective-humility
  label: "Christian / Contemplative Humility"
  statement: "Cultivate humility through service, confession, and recognition of limited perspective."
  practice: "Daily examen. One anonymous service act per week."

- id: corrective-social-praxis
  label: "Social Praxis"
  statement: "Ground all insight in concrete relationship, work, and community."
  practice: "Take one insight and apply it in a specific relationship or work context."

- id: corrective-burbea-soulmaking
  label: "Burbea Soulmaking"
  statement: "Use emptiness to free imagination, not to flatten meaning. Soulmaking as poetic-emergent practice."
  practice: "Take one experience and investigate its imaginal dimensions."

- id: corrective-rasa
  label: "Rasa / Aesthetic Savoring"
  statement: "Develop taste and aesthetic sensitivity as a mode of spiritual practice."
  practice: "Engage one art form with full presence daily."

- id: corrective-devotion
  label: "Devotion / Bhakti"
  statement: "Cultivate devotion as a counterbalance to dry deconstruction and inflation."
  practice: "Daily devotional practice: prayer, offering, or praise."

- id: corrective-body-practice
  label: "Body Practice"
  statement: "Ground through body: yoga, martial arts, somatic therapy, or movement practice."
  practice: "30 minutes of body practice daily."

- id: corrective-marx
  label: "Marx / Ideology Critique"
  statement: "Examine how spiritual practices may serve material and social interests."
  practice: "Analyze one spiritual belief through material conditions."

- id: corrective-somatics
  label: "Somatics / Trauma Work"
  statement: "Address psychological wounds through body-based therapeutic approaches."
  practice: "Somatic therapy or trauma-informed bodywork."

- id: corrective-trauma-work
  label: "Trauma Resolution"
  statement: "Process unresolved trauma before or alongside deep spiritual practice."
  practice: "Trauma-informed therapy or peer support."

- id: corrective-concrete-repair
  label: "Concrete Repair"
  statement: "Make amends and repair actual relationships and situations."
  practice: "Identify one relationship needing repair. Take one step today."

- id: corrective-krishnamurti
  label: "Krishnamurti / Choiceless Awareness"
  statement: "Observe without observer. See the system without identifying with it."
  practice: "Sit and observe thoughts without labeling them as yours."

- id: corrective-nagarjuna
  label: "Nāgārjuna / Middle Way"
  statement: "Avoid eternalism and nihilism through rigorous dialectical analysis."
  practice: "Apply catuṣkoṭi to any absolute claim."

- id: corrective-wittgenstein
  label: "Wittgenstein / Language Games"
  statement: "Examine how language creates pseudo-problems. Distinguish use from essence."
  practice: "Ask 'how is this word used?' rather than 'what does it mean?'"

- id: corrective-fruit-test
  label: "Fruit Test"
  statement: "Test any teaching, practice, or experience by its fruits: clarity, kindness, discipline, embodiment, freedom."
  practice: "For each teaching, ask: does this produce clarity, kindness, and concrete betterment?"

- id: corrective-nyaya-pramana
  label: "Nyāya Pramāṇa / Epistemic Discipline"
  statement: "Use epistemic criteria to evaluate claims: perception, inference, testimony, comparison, and implication."
  practice: "Classify each claim by its epistemic source and validity."

- id: corrective-jung-projection
  label: "Jung Projection Recognition"
  statement: "Examine how external entities may be projections of unconscious contents."
  practice: "Journal about guidance figures. What part of self might they represent?"

- id: corrective-decision-journal
  label: "Decision Journal"
  statement: "Track decisions and their outcomes to build discernment and reduce dependency."
  practice: "Log one decision per day with rationale and outcome."

- id: corrective-nanananda-protocol
  label: "Ñāṇananda Contact-Feeling-Sign Protocol"
  statement: "Trace experience back to contact → feeling → sign → proliferation. See how reification arises."
  practice: "Label: contact → pleasant/neutral/unpleasant → sign → story → release."

- id: corrective-body-grounding
  label: "Body Grounding"
  statement: "Anchor awareness in physical sensation to prevent dissociation and attention collapse."
  practice: "Three grounding breaths before any practice. Feel feet on floor."

- id: corrective-source-fasting
  label: "Source Fasting"
  statement: "Take a break from reading, studying, and content consumption to let direct experience lead."
  practice: "No cosmology or esoteric reading for one week. Journal what arises."

- id: corrective-epistemic-tiering
  label: "Epistemic Tiering"
  statement: "Explicitly distinguish evidence levels: established, interpretive, speculative, visionary, ritual, practice-validated."
  practice: "Before making a claim, assign its evidence tier."

- id: corrective-historical-distinction
  label: "Historical Distinction"
  statement: "Distinguish conceptual parallels from historical influence. Map lineage carefully."
  practice: "Before claiming influence, check: is there an attested historical pathway?"

- id: corrective-body-anchor
  label: "Body Anchor"
  statement: "Use a physical anchor (breath, posture, touch) to stabilize attention during nonordinary practice."
  practice: "Keep one hand on belly. When attention drifts, return to the breath-hand-belly triangle."

- id: corrective-shorter-session
  label: "Shorter Session"
  statement: "Reduce practice duration to prevent fatigue and attention collapse."
  practice: "Do 10 minutes instead of 30. Stop while still clear."

- id: corrective-contact-feeling-sign
  label: "Contact-Feeling-Sign Journal"
  statement: "After each practice session, log contact → feeling-tone → sign → pull → story."
  practice: "Write one line per stage immediately after practice."

- id: corrective-ordinary-life-practice
  label: "Ordinary Life Practice"
  statement: "Bring practice into daily activities: walking, eating, conversing, working."
  practice: "Choose one daily activity and do it as practice."
