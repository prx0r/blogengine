- id: phase-1-dashboard-diagnosis
  label: "Dashboard Diagnosis"
  phaseNumber: 1
  entryAssumption: "I know what my life looks like."
  proofMove: "Before insight can land, you must see your current operating system clearly."
  replacementModel: "The dashboard is not the territory, but it is the honest starting point."
  practiceMove: "Log one week of actual behavior. No interpretation, no judgment."
  successMarker: "You can describe your patterns without defensiveness."
  failureMode: "Staying in abstract analysis without committing to data."
  nextPhaseLogic: "Once you see the dashboard, you must question its physical foundations."
  evidenceTier: "practice_validated"
  pathFunction: ["deconstructs", "grounds"]
  stream: "Foundation"
  summary: "The entry point. Honest self-survey of current patterns, habits, and assumptions before any transformation work."

- id: phase-2-physical-desolidification
  label: "Physical De-solidification"
  phaseNumber: 2
  entryAssumption: "Matter is solid, dead, and fundamental."
  proofMove: "Physics, neuroscience, and phenomenology show that what we call matter is process all the way down."
  replacementModel: "Reality is relational process, not dead substance."
  practiceMove: "Examine one experience closely: find the boundary between perception and thing."
  successMarker: "You no longer take matter for granted as the unquestioned ground."
  failureMode: "Intellectualizing without embodying the shift."
  nextPhaseLogic: "If matter is process, then mind is not a computer running on meat."
  evidenceTier: "established"
  pathFunction: ["deconstructs", "grounds"]
  stream: "Physical / Metaphysical Structure"
  summary: "Break the assumption that matter is dead, solid, and fundamental. Physics, process philosophy, and phenomenology converge on reality as relational process."

- id: phase-3-mind-as-computer-critique
  label: "Mind-as-Computer Critique"
  phaseNumber: 3
  entryAssumption: "Mind is a biological computer processing information."
  proofMove: "Computational models are useful tools, not ontological truths. Mind is situated, embodied, and enactive."
  replacementModel: "Mind is active rendering, not passive computation."
  practiceMove: "Notice how thinking changes body state, and body state changes thinking."
  successMarker: "You stop treating cognition as abstract information processing."
  failureMode: "Replacing one reductive model with another."
  nextPhaseLogic: "If mind is not a computer, who or what is running the show?"
  evidenceTier: "serious_interpretive"
  pathFunction: ["deconstructs"]
  stream: "Mind / Cognition"
  summary: "Critique the computational model of mind. Mind is not a CPU; it is situated, embodied, and world-enacting."

- id: phase-4-nested-agency
  label: "Nested Agency"
  phaseNumber: 4
  entryAssumption: "There is one conscious 'I' in charge."
  proofMove: "Agency is layered: unconscious, autonomic, subconscious, reflective, intersubjective."
  replacementModel: "Agency is a nested federation, not a unitary command center."
  practiceMove: "Observe competing impulses. Which 'I' acts? Note the shift between them."
  successMarker: "You notice the multiplicity of self without fragmentation."
  failureMode: "Dissociation or infinite regress of who watches the watcher."
  nextPhaseLogic: "If agency is nested, what mechanizes or compels those agents?"
  evidenceTier: "serious_interpretive"
  pathFunction: ["deconstructs", "opens_imaginal"]
  stream: "Agency / Self"
  summary: "You are not one. Agency is a nested federation of subagents, not a unitary commander."

- id: phase-5-mechanicality
  label: "Mechanicality"
  phaseNumber: 5
  entryAssumption: "I am freely choosing my actions."
  proofMove: "Pattern analysis reveals habit, conditioning, and unconscious programming."
  replacementModel: "Much of behavior is mechanical. Freedom is a capacity, not a given."
  practiceMove: "Track one automatic reaction per day. What triggered it? What was the script?"
  successMarker: "You see your conditioning without shame or denial."
  failureMode: "Fatalism or nihilism ('I'm just a machine')."
  nextPhaseLogic: "If behavior is mechanical, what is the mechanism? Dependent arising."
  evidenceTier: "serious_interpretive"
  pathFunction: ["deconstructs"]
  stream: "Freedom / Conditioning"
  summary: "Recognize mechanicality: the vast majority of behavior runs on habit and conditioning, not free choice."

- id: phase-6-dependent-arising
  label: "Dependent Arising Protocol"
  phaseNumber: 6
  entryAssumption: "Things arise from themselves or from nothing."
  proofMove: "Everything arises in dependence on causes and conditions. This includes self, world, and experience."
  replacementModel: "Experience is a dependently arisen process, not a collection of fixed things."
  practiceMove: "Contact → Feeling → Sign → Proliferation. Trace one experience back through these stages."
  successMarker: "You directly see how experience is constructed, not given."
  failureMode: "Turning dependent arising into a dry intellectual formula."
  nextPhaseLogic: "If everything is dependently arisen, nothing has fixed essence. Emptiness."
  evidenceTier: "practice_validated"
  pathFunction: ["deconstructs", "grounds"]
  stream: "Conditionality / Process"
  summary: "Dependent arising: experience arises through contact → feeling → sign → proliferation. Nothing arises from nothing."

- id: phase-7-emptiness
  label: "Emptiness / Anti-Reification"
  phaseNumber: 7
  entryAssumption: "Things have fixed, independent essence."
  proofMove: "If something has fixed essence, it cannot change. But everything changes. Essence is a useful convention, not a found property."
  replacementModel: "Emptiness: things are empty of fixed essence, full of relational process."
  practiceMove: "Take one reified concept (self, world, god, soul). Hold it lightly. Investigate its edges."
  successMarker: "Reification loosens. You can use concepts without being possessed by them."
  failureMode: "Nihilism or flattening ('nothing exists')."
  nextPhaseLogic: "Emptiness is not the end. It clears ground for non-fabrication."
  evidenceTier: "serious_interpretive"
  pathFunction: ["deconstructs", "corrects_risk"]
  stream: "Emptiness / Anti-Reification"
  summary: "Things are empty of fixed essence. Anti-reification: use concepts without being possessed by them."

- id: phase-8-non-fabrication
  label: "Non-Fabrication / Dzogchen-Mahāmudrā"
  phaseNumber: 8
  entryAssumption: "I must fabricate, construct, or achieve realization."
  proofMove: "Rigpa / basic awareness is already present. Fabrication obscures what is already the case."
  replacementModel: "Non-fabrication: allow awareness to recognize itself without intervention."
  practiceMove: "Short moments, many times. Rest in non-meditation. No fixing, no improving."
  successMarker: "Awareness recognizes itself without effort."
  failureMode: "Spiritual bypass ('I'm already enlightened, no practice needed') or quietism."
  nextPhaseLogic: "Non-fabrication opens into language and sign as creative expression."
  evidenceTier: "serious_interpretive"
  pathFunction: ["reconstructs", "stabilizes"]
  stream: "Non-Fabrication / Recognition"
  summary: "Basic awareness is already present. Non-fabrication: rest in recognition without effort or improvement."

- id: phase-9-language-sign-mantra
  label: "Language / Sign / Mantra"
  phaseNumber: 9
  entryAssumption: "Language describes a pre-existing world."
  proofMove: "Language does not just describe; it shapes, renders, and constitutes experience."
  replacementModel: "Language / sign / mantra is a technology of world-rendering."
  practiceMove: "Use mantra, recitation, or naming practice. Notice how sound and sign shape awareness."
  successMarker: "You experience language as creative, not merely referential."
  failureMode: "Esoteric inflation (mantra as magic power without grounding)."
  nextPhaseLogic: "If language renders worlds, what worlds do we want to render? Imaginal reconstruction."
  evidenceTier: "serious_interpretive"
  pathFunction: ["bridges", "reconstructs"]
  stream: "Language / Sign / Mantra"
  summary: "Language is not just descriptive; it shapes and renders experience. Mantra as technology of world-rendering."

- id: phase-10-imaginal-reconstruction
  label: "Imaginal Reconstruction"
  phaseNumber: 10
  entryAssumption: "Imagination is fantasy, not real."
  proofMove: "The imaginal is an autonomous ontological domain (Corbin). Symbols, archetypes, and images have their own logic and reality."
  replacementModel: "Imagination is a faculty of perception, not a faculty of fiction."
  practiceMove: "Engage one symbol actively. Let it speak. Journal its transformations."
  successMarker: "You distinguish the imaginal from both fantasy and literal fact."
  failureMode: "Inflated identification with archetypes or dissociation from body."
  nextPhaseLogic: "Imaginal work must be embodied. Body-energy interface."
  evidenceTier: "serious_interpretive"
  pathFunction: ["opens_imaginal", "reconstructs"]
  stream: "Imaginal / Symbolic"
  summary: "The imaginal is an autonomous ontological domain. Active imagination as perception."

- id: phase-11-body-energy
  label: "Body-Energy Interface"
  phaseNumber: 11
  entryAssumption: "Body is a machine. Energy is metaphorical."
  proofMove: "Somatic practices, subtle body traditions, and energy psychology all demonstrate a lived interface between body and awareness."
  replacementModel: "Body is the anchor of presence. Energy/feeling is navigable."
  practiceMove: "Body scan. Energy tracking. Grounding. Feeling tone labeling."
  successMarker: "You can stay present through body sensation without dissociating or fixating."
  failureMode: "Energy chasing, somatic bypass, or superstitious internal perceptions."
  nextPhaseLogic: "Body-anchored presence enables ritual re-rendering."
  evidenceTier: "practice_validated"
  pathFunction: ["grounds", "stabilizes"]
  stream: "Body / Energy / Somatic"
  summary: "Body as anchor of presence. Subtle body, energy tracking, and grounding as lived realities."

- id: phase-12-ritual-re-rendering
  label: "Ritual Re-Rendering"
  phaseNumber: 12
  entryAssumption: "Ritual is superstition or mere symbolism."
  proofMove: "Ritual reorders body, speech, mind, space, and time. It is a technology of transformation."
  replacementModel: "Ritual is a meaning-making and reality-structuring technology."
  practiceMove: "Design one small ritual. Perform it with full presence. Note the shift."
  successMarker: "You experience ritual as effective without demanding literalist metaphysics."
  failureMode: "Ritual inflation (magic without ethics) or mechanical repetition without presence."
  nextPhaseLogic: "Ritual opens channels. What speaks through them? Daimon / guidance."
  evidenceTier: "historical_ritual"
  pathFunction: ["reconstructs", "orders_field"]
  stream: "Ritual / Practice"
  summary: "Ritual as technology of transformation. Reorders body, speech, mind, space, and time."

- id: phase-13-daimon-guidance
  label: "Daimon / Guidance / Vocation"
  phaseNumber: 13
  entryAssumption: "Guidance comes from outside or is pure projection."
  proofMove: "Daimonic guidance (Socrates, Jung, Hillman, Corbin) suggests an autonomous inner-other with genuine intelligence."
  replacementModel: "The daimon is an autonomous psychic factor that can be consulted without idolatry."
  practiceMove: "Active imagination with a guidance figure. Write what comes. Test the fruit."
  successMarker: "You can receive guidance without dependency, inflation, or possession."
  failureMode: "Daimon inflation (specialness), channeling dependency, or paranoid projection."
  nextPhaseLogic: "Daimonic guidance opens into nonordinary states."
  evidenceTier: "serious_interpretive"
  pathFunction: ["receives_guidance", "opens_imaginal"]
  stream: "Daimon / Guidance / Vocation"
  summary: "The daimon as autonomous inner-other. Guidance that can be consulted without idolatry or dependency."

- id: phase-14-nonordinary-rendering
  label: "Nonordinary Rendering"
  phaseNumber: 14
  entryAssumption: "Ordinary waking consciousness is the most reliable state."
  proofMove: "Nonordinary states (hypnagogic, meditative, psychedelic, dreaming) reveal different renderings of experience."
  replacementModel: "Consciousness can be rendered in multiple modes. Ordinary waking is one mode, not the only mode."
  practiceMove: "Explore one nonordinary mode safely: hypnagogic, lucid dream, breathwork, or meditative access."
  successMarker: "You can navigate nonordinary states without destabilization or addiction."
  failureMode: "State chasing, destabilization, spiritual emergency, or escapism."
  nextPhaseLogic: "Nonordinary experience reveals more-than-human reality. Ecology / animism."
  evidenceTier: "practice_validated"
  pathFunction: ["opens_imaginal", "bridges"]
  stream: "Nonordinary States"
  summary: "Consciousness renders in multiple modes. Nonordinary states are valid ways of knowing."

- id: phase-15-ecology-animism
  label: "Ecology / Animism / More-than-Human"
  phaseNumber: 15
  entryAssumption: "The world is a resource for human use."
  proofMove: "Indigenous, animist, and ecological worldviews show that the more-than-human world is communicative and ensouled."
  replacementModel: "The world is a community of subjects, not a collection of objects."
  practiceMove: "Spend time with one non-human being (tree, animal, place). Listen without agenda."
  successMarker: "You experience the world as alive and communicative."
  failureMode: "Romantic regression, nature-bypass, or projection onto nature."
  nextPhaseLogic: "Animist sensitivity opens into full visionary cosmology."
  evidenceTier: "serious_interpretive"
  pathFunction: ["incarnates", "bridges"]
  stream: "Ecology / Animism / More-than-Human"
  summary: "The world is a community of subjects. Ecological and animist worldviews as genuine ontological proposals."

- id: phase-16-visionary-cosmologies
  label: "Visionary Cosmologies"
  phaseNumber: 16
  entryAssumption: "The cosmos is dead matter + physical laws."
  proofMove: "Visionary cosmologies (Kabbalah, Steiner, Campbell, Gnostic, channeling) offer meaning-rich maps of reality."
  replacementModel: "Visionary cosmologies are imaginal maps that may disclose real structures."
  practiceMove: "Study one cosmology. Use it as a lens for one week. Note what it reveals and what it obscures."
  successMarker: "You can use cosmologies as useful maps without mistaking them for literal territory."
  failureMode: "Cosmic map addiction, gnostic inflation, spiritual specialness."
  nextPhaseLogic: "Vision must be grounded in social incarnation."
  evidenceTier: "visionary_mythic"
  pathFunction: ["opens_imaginal", "orders_field"]
  stream: "Visionary Cosmologies"
  summary: "Visionary cosmologies as meaning-rich maps. Use them as lenses, not literal territory."

- id: phase-17-social-incarnation
  label: "Social Incarnation / Praxis"
  phaseNumber: 17
  entryAssumption: "My practice is personal and private."
  proofMove: "Practice that does not incarnate in relationship, work, and community is incomplete."
  replacementModel: "Practice must be tested, embodied, and expressed in concrete social life."
  practiceMove: "Take one insight and embody it in one real relationship or work context this week."
  successMarker: "Your practice is visible in how you treat others and do your work."
  failureMode: "Social bypass (private enlightenment without relational transformation)."
  nextPhaseLogic: "Incarnation completes the cycle. The next loop begins at diagnosis."
  evidenceTier: "practice_validated"
  pathFunction: ["incarnates", "pressure_tests"]
  stream: "Social / Ethical / Practical"
  summary: "Practice must incarnate in relationship, work, and community. The cycle completes and renews."
